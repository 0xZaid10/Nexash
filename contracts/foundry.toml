[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
gas_reports = ["*"]

[rpc_endpoints]
hashkey_mainnet = "${HASHKEY_MAINNET_RPC_URL}"
hashkey_testnet = "${HASHKEY_TESTNET_RPC_URL}"

[etherscan]
hashkey_mainnet = { key = "${HASHKEY_EXPLORER_API_KEY}", url = "${HASHKEY_EXPLORER_API_URL}" }
